<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect fill="#fef3c7" width="800" height="500"/>
  <!-- Left small tower -->
  <rect fill="#b45309" x="220" y="260" width="80" height="140"/>
  <polygon fill="#92400e" points="220,260 260,200 300,260"/>
  <!-- Right small tower -->
  <rect fill="#b45309" x="500" y="260" width="80" height="140"/>
  <polygon fill="#92400e" points="500,260 540,200 580,260"/>
  <!-- Main nave -->
  <rect fill="#d97706" x="270" y="210" width="260" height="190"/>
  <!-- Main roof pediment -->
  <polygon fill="#92400e" points="255,210 400,110 545,210"/>
  <!-- Cross on top -->
  <rect fill="#78350f" x="393" y="65" width="14" height="65"/>
  <rect fill="#78350f" x="375" y="82" width="50" height="13"/>
  <!-- Pointed arch main door -->
  <path d="M358,400 L358,315 Q400,275 442,315 L442,400 Z" fill="#92400e"/>
  <!-- Left arch window -->
  <path d="M290,255 L290,305 Q320,275 350,305 L350,255 Z" fill="#78350f"/>
  <!-- Right arch window -->
  <path d="M450,255 L450,305 Q480,275 510,305 L510,255 Z" fill="#78350f"/>
  <!-- Left tower window -->
  <path d="M236,280 L236,320 Q260,300 284,320 L284,280 Z" fill="#78350f"/>
  <!-- Right tower window -->
  <path d="M516,280 L516,320 Q540,300 564,320 L564,280 Z" fill="#78350f"/>
  <!-- Ground -->
  <rect fill="#92400e" y="400" width="800" height="100"/>
  <text x="400" y="458" text-anchor="middle" fill="#fef3c7" font-family="Inter,sans-serif" font-size="24" font-weight="600">Kościoły Wrocławia</text>
</svg>
