<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#d97706"/>

  <!-- Hat brim -->
  <ellipse cx="16" cy="13.5" rx="6.5" ry="1.5" fill="#92400e"/>
  <!-- Hat cone -->
  <polygon points="16,5 10.5,13.5 21.5,13.5" fill="#92400e"/>
  <!-- Hat tip ball -->
  <circle cx="16" cy="5.2" r="1.1" fill="#fbbf24"/>

  <!-- Face -->
  <circle cx="16" cy="17" r="4.2" fill="#fde68a"/>

  <!-- Eyes -->
  <circle cx="14.4" cy="16.5" r="0.65" fill="#1c1917"/>
  <circle cx="17.6" cy="16.5" r="0.65" fill="#1c1917"/>

  <!-- Rosy cheeks -->
  <circle cx="13.2" cy="17.8" r="0.9" fill="#fca5a5" opacity="0.6"/>
  <circle cx="18.8" cy="17.8" r="0.9" fill="#fca5a5" opacity="0.6"/>

  <!-- Smile -->
  <path d="M14.2 18.6 Q16 20 17.8 18.6" stroke="#92400e" stroke-width="0.6" fill="none" stroke-linecap="round"/>

  <!-- Beard -->
  <ellipse cx="16" cy="21.5" rx="3.8" ry="2" fill="#fef3c7"/>

  <!-- Body -->
  <rect x="12.5" y="23" width="7" height="5" rx="2" fill="#b45309"/>

  <!-- Belt buckle -->
  <rect x="14.8" y="24.5" width="2.4" height="1.5" rx="0.4" fill="#fbbf24"/>
</svg>
